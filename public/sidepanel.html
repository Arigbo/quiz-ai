<!DOCTYPE html>
<html>
  <head>
    <title>QuizSolver AI PRO</title>
    <meta charset="utf-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
        background: #0f0f13;
        color: #e2e8f0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .header {
        padding: 16px 18px 12px;
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        border-bottom: 1px solid rgba(99,102,241,.25);
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
      }
      .logo {
        width: 32px; height: 32px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px;
      }
      .header-text h1 { font-size: 14px; font-weight: 700; color: #f1f5f9; }
      .header-text p  { font-size: 11px; color: #64748b; margin-top: 1px; }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 14px;
        overflow-y: auto;
      }

      .card {
        background: linear-gradient(135deg, rgba(99,102,241,.1) 0%, rgba(139,92,246,.07) 100%);
        border: 1px solid rgba(99,102,241,.28);
        border-radius: 14px;
        padding: 14px;
      }
      .card h2 {
        font-size: 12px; font-weight: 700; color: #a5b4fc;
        margin-bottom: 5px; display: flex; align-items: center; gap: 5px;
      }
      .card p { font-size: 11px; color: #64748b; line-height: 1.45; margin-bottom: 12px; }

      .btn-primary {
        width: 100%; padding: 11px 14px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        border: none; border-radius: 10px; color: #fff;
        font-size: 13px; font-weight: 600; cursor: pointer;
        transition: opacity .15s, transform .1s;
        display: flex; align-items: center; justify-content: center; gap: 7px;
        margin-bottom: 7px;
      }
      .btn-primary:hover  { opacity: .9; }
      .btn-primary:active { transform: scale(.98); }
      .btn-primary:disabled { opacity: .35; cursor: not-allowed; }

      .btn-secondary {
        width: 100%; padding: 9px 14px;
        background: rgba(255,255,255,.04);
        border: 1px solid rgba(255,255,255,.1);
        border-radius: 10px; color: #94a3b8;
        font-size: 12px; font-weight: 500; cursor: pointer;
        transition: background .15s;
        display: flex; align-items: center; justify-content: center; gap: 6px;
      }
      .btn-secondary:hover { background: rgba(255,255,255,.08); }
      .btn-secondary:disabled { opacity: .35; cursor: not-allowed; }

      .btn-danger {
        width: 100%; padding: 9px 14px;
        background: rgba(239,68,68,.12);
        border: 1px solid rgba(239,68,68,.3);
        border-radius: 10px; color: #fca5a5;
        font-size: 12px; font-weight: 500; cursor: pointer;
        transition: background .15s;
        display: flex; align-items: center; justify-content: center; gap: 6px;
        margin-top: 6px;
        display: none;
      }
      .btn-danger:hover { background: rgba(239,68,68,.2); }

      #status-area { display: none; }
      .status-box {
        border-radius: 10px; padding: 11px 13px;
        font-size: 11.5px; line-height: 1.6;
      }
      .status-box.loading {
        background: rgba(99,102,241,.1);
        border: 1px solid rgba(99,102,241,.25);
        color: #a5b4fc;
        display: flex; align-items: flex-start; gap: 8px;
      }
      .status-box.success {
        background: rgba(34,197,94,.08);
        border: 1px solid rgba(34,197,94,.25);
        color: #86efac;
      }
      .status-box.error {
        background: rgba(239,68,68,.08);
        border: 1px solid rgba(239,68,68,.25);
        color: #fca5a5;
      }

      /* Progress bar */
      .progress-wrap {
        display: none;
        margin-top: 4px;
        background: rgba(255,255,255,.06);
        border-radius: 6px; height: 6px; overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #6366f1, #8b5cf6);
        border-radius: 6px;
        transition: width .4s ease;
        width: 0%;
      }

      .log-list {
        margin-top: 8px;
        max-height: 160px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .log-item {
        font-size: 10.5px;
        color: #64748b;
        padding: 3px 6px;
        border-radius: 5px;
        background: rgba(255,255,255,.03);
        line-height: 1.4;
      }
      .log-item.done  { color: #86efac; }
      .log-item.error { color: #fca5a5; }
      .log-item.active { color: #a5b4fc; background: rgba(99,102,241,.1); }

      .answer-label { font-size: 10px; color: #64748b; margin-bottom: 2px; }
      .answer-text  { font-size: 12px; font-weight: 600; color: #f1f5f9; }
      .answer-index {
        display: inline-block; background: rgba(99,102,241,.25);
        color: #a5b4fc; border-radius: 4px; padding: 1px 6px;
        font-size: 10px; font-weight: 700; margin-right: 5px;
      }

      .spinner {
        width: 13px; height: 13px; flex-shrink: 0;
        border: 2px solid rgba(165,180,252,.3);
        border-top-color: #a5b4fc;
        border-radius: 50%;
        animation: spin .7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .divider { height: 1px; background: rgba(255,255,255,.06); }

      .footer {
        display: flex; align-items: center; justify-content: center;
        padding: 9px; color: #475569; font-size: 11px;
      }
      .footer a { color: #6366f1; text-decoration: none; font-weight: 500; }
      .footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">🧠</div>
      <div class="header-text">
        <h1>QuizSolver AI PRO</h1>
        <p>Powered by Gemini</p>
      </div>
    </div>

    <div class="main">
      <div class="card">
        <h2>⚡ Auto-Complete Quiz</h2>
        <p>AI answers every question and automatically advances through the quiz until it hits Submit.</p>

        <button class="btn-primary" id="btn-full-quiz">
          <span>🚀</span> Auto-Complete Entire Quiz
        </button>

        <button class="btn-secondary" id="btn-one-question">
          <span>🎯</span> Answer This Question Only
        </button>

        <button class="btn-danger" id="btn-stop">
          ⛔ Stop
        </button>
      </div>

      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>

      <div id="status-area">
        <div class="status-box" id="status-box"></div>
        <div class="log-list" id="log-list"></div>
      </div>

      <div class="divider"></div>
    </div>

    <div class="footer">
      <a href="https://quiz-ai-kappa.vercel.app" target="_blank">Open full app ↗</a>
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>
